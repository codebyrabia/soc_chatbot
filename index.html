<!DOCTYPE html>
<html>
<head>
<title>SOC Chatbot</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:420px;
    background:#111827;
    padding:20px;
    border-radius:12px;
}

#chat{
    height:300px;
    overflow:auto;
    margin-bottom:10px;
}

.msg{
    margin:5px 0;
}

.user{color:#60a5fa}
.bot{color:#34d399}

.high{color:red}
.medium{color:orange}
.low{color:lightgreen}

input{
    width:75%;
    padding:8px;
}

button{
    padding:8px;
    background:green;
    color:white;
    border:none;
}
</style>

</head>

<body>

<div class="box">

<h3>🛡 SOC Chatbot</h3>

<div id="chat"></div>

<input id="msg" placeholder="[ERROR] 192.168.1.5 failed login 5 times">
<button onclick="send()">Analyze</button>

</div>

<script>
function add(text,className){
    let div=document.createElement("div");
    div.className="msg "+className;
    div.innerText=text;
    document.getElementById("chat").appendChild(div);
}

function send(){
    let msg=document.getElementById("msg").value;

    add("You: "+msg,"user");

    fetch("http://127.0.0.1:5000/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    })
    .then(r=>r.json())
    .then(d=>{
        add("Bot: "+d.reply,"bot");

        // 🔥 SEVERITY GÖSTER
        let sevClass = d.severity.toLowerCase();
        add("Severity: " + d.severity, sevClass);
    });

    document.getElementById("msg").value="";
}
</script>

</body>
</html>
